name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TURBO_TELEMETRY_DISABLED: '1'
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build all workspaces
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Gateway tests
        run: npm run test:gateway

  coverage:
    name: Test coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TURBO_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build shared packages
        run: npx turbo run build --filter='./packages/*'

      - name: API coverage
        run: npm run test:coverage --workspace=@sfcc/api

      - name: Web coverage
        run: npm run test:coverage --workspace=@sfcc/web

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api/coverage
            apps/web/coverage
          retention-days: 14
